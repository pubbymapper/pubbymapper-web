<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pubbymapper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFF9E5;
      color: #1a1a1a;
      padding: 2rem;
      line-height: 1.5;
    }
    .card {
      max-width: 480px;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1a1a1a;
      margin-bottom: 1rem;
    }
    .intro {
      font-size: 1.0625rem;
      color: #334155;
      font-weight: 400;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .cta {
      display: inline-block;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      background: #0d9488;
      text-decoration: none;
      padding: 0.625rem 1.25rem;
      border-radius: 6px;
      border: none;
      transition: background 0.2s;
    }
    .cta:hover {
      background: #0f766e;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello pubbymapper.</h1>
    <p class="intro">We're building a pub app! Our mission is to help you find your next favourite pub. Help us build the hype and shape where we're taking this — put some details below to join the crawl 🍺</p>
    <a href="https://tally.so/r/BzGyD1" class="cta" target="_blank" rel="noopener noreferrer">Pubbymapper hype sheet →</a>
  </main>
</body>
</html>
