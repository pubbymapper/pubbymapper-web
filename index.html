<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pubbymapper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      padding: 2rem;
      line-height: 1.5;
    }
    .card {
      max-width: 420px;
      text-align: center;
    }
    .logo {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0d9488;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: #0f172a;
    }
    .tagline {
      font-size: 1.0625rem;
      color: #64748b;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }
    .wink {
      font-size: 1rem;
      color: #0d9488;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="logo">Pubbymapper</p>
    <h1>Find your local. Then find your way home.</h1>
    <p class="tagline">Maps that get it—pubs, routes, and the bit in between.</p>
    <p class="wink">Coming soon.</p>
  </main>
</body>
</html>
