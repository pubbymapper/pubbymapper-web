[build]
  command = "npm run build"
  publish = "dist"

# Same-origin API (avoids CORS): browser calls /api/*, Netlify proxies to the backend.
[[redirects]]
  from = "/api/*"
  to = "https://api.pubbymapper.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
